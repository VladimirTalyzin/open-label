# HTTP -> HTTPS redirect
server {
    listen 185.4.73.112:80;
    server_name open-label.poisk.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 185.4.73.112:443 ssl;
    server_name open-label.poisk.com;

    ssl_certificate     "/var/www/httpd-cert/morfo/poisk.com_le1.crtca";
    ssl_certificate_key "/var/www/httpd-cert/morfo/poisk.com_le1.key";
    ssl_ciphers         EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_dhparam         /etc/ssl/certs/dhparam4096.pem;

    charset utf-8;

    access_log /var/www/httpd-logs/open-label.poisk.com.access.log;
    error_log  /var/www/httpd-logs/open-label.poisk.com.error.log notice;

    # Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static assets built by Vite (JS/CSS bundles with content hashes)
    # Served directly by nginx, long cache thanks to hashed filenames
    location /assets/ {
        alias /open-label/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # All other requests -> FastAPI backend on port 8001
    # Backend serves: index.html (SPA), API endpoints, images, previews, etc.
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload support (images can be large)
        client_max_body_size 100m;

        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
