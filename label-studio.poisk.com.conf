server {
	server_name label-studio.poisk.com ;
	ssl_certificate "/var/www/httpd-cert/morfo/poisk.com_le1.crtca";
	ssl_certificate_key "/var/www/httpd-cert/morfo/poisk.com_le1.key";
	ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
	ssl_prefer_server_ciphers on;
	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
	ssl_dhparam /etc/ssl/certs/dhparam4096.pem;
	charset off;
	index index.php index.html;
	disable_symlinks if_not_owner from=$root_path;
	include /etc/nginx/vhosts-includes/*.conf;
	include /etc/nginx/vhosts-resources/label-studio.poisk.com/*.conf;
	access_log /var/www/httpd-logs/label-studio.poisk.com.access.log;
	error_log /var/www/httpd-logs/label-studio.poisk.com.error.log notice;
	ssi on;
	set $root_path /var/www/morfo/data/www/label-studio.poisk.com;
	root $root_path;
    gzip on;
	gzip_comp_level 5;
    gzip_disable "msie6";
	gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript image/svg+xml;
    location ~* ^/.*$ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpe?g|avi|zip|gz|bz2?|rar|swf|webp|woff|woff2)$ {
        expires 1h;
    }
	include /etc/nginx/users-resources/morfo/*.conf;
	location / {
		location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpe?g|avi|zip|gz|bz2?|rar|swf|webp|woff|woff2)$ {
			expires 24h;
		}
	}
	listen 185.4.73.112:443 ssl;
}
server {
	server_name label-studio.poisk.com ;
	charset off;
	index index.php index.html;
	disable_symlinks if_not_owner from=$root_path;
	include /etc/nginx/vhosts-includes/*.conf;
	include /etc/nginx/vhosts-resources/label-studio.poisk.com/*.conf;
	include /etc/nginx/users-resources/morfo/*.conf;
	access_log /var/www/httpd-logs/label-studio.poisk.com.access.log;
	error_log /var/www/httpd-logs/label-studio.poisk.com.error.log notice;
	ssi on;
	return 301 https://$host:443$request_uri;
	set $root_path /var/www/morfo/data/www/label-studio.poisk.com;
	root $root_path;
	listen 185.4.73.112:80;
	gzip on;
	gzip_comp_level 5;
	gzip_disable "msie6";
	gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript image/svg+xml;
	location / {
		location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpe?g|avi|zip|gz|bz2?|rar|swf|webp|woff|woff2)$ {
			expires 24h;
		}
	}
}