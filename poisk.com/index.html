<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jork Maps</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="/twentytwenty/twentytwenty.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">Jork Maps</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" href="#" data-toggle="modal" data-target="#helpModal">Help</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-toggle="modal" data-target="#contactsModal">Contacts</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <div id="preload-container" style="width: 100%; display:none; position: relative;">
        <img id="preload" src="" alt="Preload Image" style="width: 100%" />
        <div id="loadingSpinner" class="spinner-container">
            <div class="spinner-border text-primary" role="status">
                <span class="sr-only">Processing...</span>
            </div>
        </div>
    </div>
    <div class="twentytwenty-container" id="twentytwenty-container" style="display:none;">
        <img id="beforeImage" src="" alt="Original Image" />
        <img id="afterImage" src="" alt="Processed Image" />
    </div>
    <form id="uploadForm" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">Upload your map:</label>
            <input type="file" class="form-control-file" id="file" name="file" required>
        </div>
        <div class="form-group">
            <button type="submit" class="btn btn-primary">Process</button>
        </div>
        <div class="form-group">
            <label for="scale">Scale (e.g., 3234m or 17z):</label>
            <input type="text" class="form-control" id="scale" name="scale">
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="use_rules" name="classes" value="use_rules" checked>
            <label class="form-check-label" for="use_rules">Use rules</label>
        </div>
        <hr>
        <div id="classesContainer"></div>
        <br>
        <button id="settingsButton" class="btn btn-secondary" type="button">
            <i class="fa fa-cog"></i> Settings
        </button>

        <div id="settingsPanel" style="display: none; margin-top: 10pt;">
            <label for="jsonInput">RAW Settings</label>
            <textarea class="form-control" id="jsonInput" rows="30"></textarea>
        </div>
    </form>
</div>

<!-- Help Modal -->
<div class="modal fade" id="helpModal" tabindex="-1" role="dialog" aria-labelledby="helpModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="helpModalLabel">Help</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>To use Jork Maps segmentation, please upload a map file and click the "Process" button. You can also select labels for search and configure their settings.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Contacts Modal -->
<div class="modal fade" id="contactsModal" tabindex="-1" role="dialog" aria-labelledby="contactsModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="contactsModalLabel">Contacts</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>Email: jork69@mail.ru</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="/twentytwenty/jquery.twentytwenty.js"></script>
<script src="/twentytwenty/jquery.event.move.js"></script>
<script src="utility.js"></script>
<script src="script.js"></script>
</body>
</html>
