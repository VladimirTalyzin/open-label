<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Label</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>
<body>
  <!-- Login form -->
  <div id="login-container" style="display:none;">
    <div style="max-width:360px;margin:100px auto;padding:30px;border:1px solid #dee2e6;border-radius:8px;background:#fff;">
      <h3 style="text-align:center;margin-bottom:20px;">Open Label</h3>
      <div class="mb-3">
        <input id="login-username" type="text" class="form-control" placeholder="Username">
      </div>
      <div class="mb-3">
        <input id="login-password" type="password" class="form-control" placeholder="Password">
      </div>
      <div id="login-error" style="color:red;margin-bottom:10px;display:none;"></div>
      <button id="login-button" class="btn btn-primary w-100">Login</button>
      <hr>
      <button id="admin-login-toggle" class="btn btn-outline-secondary btn-sm w-100">Admin panel</button>
    </div>
  </div>

  <!-- Admin login form -->
  <div id="admin-login-container" style="display:none;">
    <div style="max-width:360px;margin:100px auto;padding:30px;border:1px solid #dee2e6;border-radius:8px;background:#fff;">
      <h3 style="text-align:center;margin-bottom:20px;">Admin Panel</h3>
      <div class="mb-3">
        <input id="admin-password" type="password" class="form-control" placeholder="Admin password">
      </div>
      <div id="admin-login-error" style="color:red;margin-bottom:10px;display:none;"></div>
      <button id="admin-login-button" class="btn btn-primary w-100">Enter</button>
      <button id="admin-back-button" class="btn btn-outline-secondary btn-sm w-100 mt-2">Back to login</button>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="admin-container" style="display:none;">
    <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
      <span class="navbar-brand mb-0 h1">Open Label - Admin</span>
      <div class="ms-auto">
        <button id="admin-logout-button" class="btn btn-outline-light btn-sm">Exit admin</button>
      </div>
    </nav>
    <div class="container mt-4">
      <div class="row">
        <div class="col-md-6">
          <div class="card mb-4">
            <div class="card-header"><strong>Groups</strong></div>
            <div class="card-body">
              <div class="input-group mb-3">
                <input id="new-group-name" type="text" class="form-control" placeholder="Group name">
                <button id="add-group-button" class="btn btn-success">Add</button>
              </div>
              <div id="groups-list"></div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card mb-4">
            <div class="card-header"><strong>Users</strong></div>
            <div class="card-body">
              <div class="mb-3">
                <input id="new-user-name" type="text" class="form-control mb-2" placeholder="Username">
                <input id="new-user-password" type="password" class="form-control mb-2" placeholder="Password">
                <select id="new-user-group" class="form-select mb-2"></select>
                <button id="add-user-button" class="btn btn-success w-100">Add user</button>
              </div>
              <div id="users-list"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="card mb-4">
            <div class="card-header"><strong>Project access</strong></div>
            <div class="card-body">
              <div id="project-groups-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="main-app" style="display:none;">
    <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
      <span class="navbar-brand mb-0 h1">Open Label</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span id="user-info" class="text-light small"></span>
        <button id="add-project-button" class="btn btn-outline-light btn-sm">+ Add project</button>
        <button id="logout-button" class="btn btn-outline-light btn-sm">Logout</button>
      </div>
    </nav>

    <div class="container-fluid mt-4 px-4">
      <div id="projects-container"></div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
